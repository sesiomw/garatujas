<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculadora">
        <div class="tela-calculadora">67</div>
        <div class="botao-calculadora">
            <button id="limpar-tela">CE</button>
            <button id="limpar-calculo">C</button>
            <button id="backspace">&le;</button>
            <button id="operador-divisao">/</button>
            <button id="tecla-7">7</button>
            <button id="tecla-8">8</button>
            <button id="tecla-9">9</button>
            <button id="operador-multiplicacao">*</button>
            <button id="tecla-4">4</button>
            <button id="tecla-5">5</button>
            <button id="tecla-6">6</button>
            <button id="operador-subtracao">-</button>
            <button id="tecla-1">1</button>
            <button id="tecla-2">2</button>
            <button id="tecla-3">3</button>
            <button id="operador-adicao">+</button>
            <button id="inverter-sinal">&plusmn;</button>
            <button id="tecla-0">0</button>
            <button id="decimal">.</button>
            <button id="igual">=</button>
        </div>
    </div>
    <script src="script.js"></script>

</body>
</html>
